<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio - Fabio</title>
    <style>
        /* Estilos do Site */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }

        /* Container do Chat Flutuante */
        #chat-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        /* Botão Redondo (Ícone) */
        #chat-toggle {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 28px;
            transition: transform 0.2s;
        }

        #chat-toggle:hover {
            transform: scale(1.1);
        }

        /* Janela do Chat */
        #chat-window {
            display: none; /* Começa escondido */
            flex-direction: column;
            width: 350px;
            height: 500px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            position: absolute;
            bottom: 80px;
            right: 0;
            overflow: hidden;
        }

        /* Cabeçalho do Chat */
        #chat-header {
            background-color: #0078d4;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        /* Área de Mensagens */
        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f9f9f9;
        }

        /* Balões de Mensagem */
        .message {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message {
            align-self: flex-end;
            background-color: #0078d4;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #e9e9eb;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        /* Área de Digitação */
        #chat-footer {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>

    <!-- Conteúdo do seu Portfólio aqui -->
    <div style="padding: 50px; text-align: center;">
        <h1>Bem-vindo ao meu Portfólio Azure</h1>
        <p>O chat de IA está no canto inferior direito.</p>
    </div>

    <!-- WIDGET DE CHAT -->
    <div id="chat-wrapper">
        <button id="chat-toggle" title="Abrir Chat">💬</button>

        <div id="chat-window">
            <div id="chat-header">
                <span>Assistente Fabio IA</span>
                <button id="close-chat" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">✕</button>
            </div>
            
            <div id="chat-messages">
                <div class="message ai-message">Olá! Eu sou a IA do Fabio. Como posso te ajudar hoje?</div>
            </div>

            <div id="chat-footer">
                <input type="text" id="chat-input" placeholder="Pergunte algo...">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatMessages = document.getElementById('chat-messages');

        // Função para abrir/fechar janela
        chatToggle.onclick = () => {
            chatWindow.style.display = 'flex';
            chatToggle.style.display = 'none';
        };

        closeChat.onclick = () => {
            chatWindow.style.display = 'none';
            chatToggle.style.display = 'block';
        };

        // Função para adicionar balões na tela
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.classList.add('message');
            div.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
            div.innerText = text;
            chatMessages.appendChild(div);
            
            // Scroll automático para o final
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        async function handleChat() {
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            addMessage(prompt, 'user');
            chatInput.value = '';

            // Balão de carregamento
            const loadingMsg = addMessage('Pensando...', 'ai');

            try {
                // CHAME SUA AZURE FUNCTION AQUI
                // Exemplo: https://sua-funcao.azurewebsites.net/api/ChatTrigger
                const response = await fetch('SUA_URL_DA_AZURE_FUNCTION_AQUI', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt })
                });

                if (!response.ok) throw new Error('Erro na resposta');

                const data = await response.json();
                
                // Ajuste 'data.reply' conforme o nome do campo que sua função retorna
                loadingMsg.innerText = data.reply || data.answer || "Recebi sua mensagem!";

            } catch (error) {
                loadingMsg.innerText = "Ops! Tive um problema ao conectar. Tente novamente.";
                console.error('Erro:', error);
            }
        }

        // Eventos de clique e teclado
        sendBtn.onclick = handleChat;
        chatInput.onkeypress = (e) => {
            if (e.key === 'Enter') handleChat();
        };
    </script>

</body>
</html>
